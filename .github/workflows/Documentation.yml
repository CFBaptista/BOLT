name: Documentation

on:
  push:
    branches:
      - master
    tags: ["*"]

permissions:
  contents: read
  packages: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  Build-Documentation:
    name: Build Documentation
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/cfbaptista/bolt-dev:0.1.0

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Configure project
        run: cmake --preset linux-x86-64-llvm-debug

      - name: Run documentation generator (Doxygen)
        run: cmake --build --preset linux-x86-64-llvm-debug --target documentation

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: build/linux-x86-64-llvm-debug/doc/doxygen/html

  Deploy-Documentation:
    needs: Build-Documentation
    name: Deploy Documentation
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
