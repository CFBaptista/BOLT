name: CI

on:
  push:
    branches:
      - master
    tags: ["*"]
  pull_request:
    branches:
      - master

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ startsWith(github.ref, 'refs/pull/') }}

jobs:
  native:
    name: Native build (${{ matrix.arch }}, ${{ matrix.preset }})
    runs-on: ${{ matrix.runner }}
    container:
      image: ${{ matrix.container_image }}
    strategy:
      matrix:
        arch:
          - x86_64
          - aarch64
        preset:
          - linux-native-gnu-debug
          - linux-native-gnu-release
          - linux-native-llvm-debug
          - linux-native-llvm-release
        include:
          - arch: x86_64
            runner: ubuntu-26.04
            container_image: ghcr.io/cfbaptista/bolt-dev-x86_64:0.1.0
          - arch: aarch64
            runner: ubuntu-26.04-arm
            container_image: ghcr.io/cfbaptista/bolt-dev-aarch64:0.1.0
      fail-fast: true

    steps:
      - name: Fix dubious ownership warning
        run: git config --global --add safe.directory "$GITHUB_WORKSPACE"

      - name: Checkout code
        uses: actions/checkout@v5

      - name: Show architecture
        run: uname -m

      - name: Configure project
        run: cmake --preset ${{ matrix.preset }}

      - name: Build project
        run: cmake --build --preset ${{ matrix.preset }}

      - name: Test project
        run: ctest --preset ${{ matrix.preset }}

      - name: Run formatter (clang-format)
        run: |
          clang-format \
            --style=file \
            $(git ls-files '*.cpp' '*.hpp' '*.tpp') \
            --dry-run \
            --Werror \
            2>&1

      - name: Run static analysis (clang-tidy)
        run: |
          clang-tidy \
            $(git ls-files '*.cpp') \
            -p build/${{ matrix.preset }} \
            2>&1

      - name: Run static analysis (cppcheck)
        run: |
          cppcheck \
            --project=build/${{ matrix.preset }}/compile_commands.json \
            --enable=all \
            --inconclusive \
            --force \
            --check-level=exhaustive \
            --suppress=missingIncludeSystem \
            --inline-suppr \
            --std=c++23 \
            --error-exitcode=1 \
            -i build/*/_deps \
            2>&1

      - name: Run documentation generation (Doxygen)
        run: cmake --build --preset ${{ matrix.preset }} --target documentation
