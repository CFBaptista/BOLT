name: CI

on:
  push:
    branches:
      - master
    tags: ["*"]
  pull_request:
    branches:
      - master

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ startsWith(github.ref, 'refs/pull/') }}

jobs:
  format:
    name: Format
    runs-on: ubuntu-26.04
    container:
      image: ghcr.io/cfbaptista/bolt-dev:0.4.0-amd64

    steps:
      - name: Fix dubious ownership warning
        run: git config --global --add safe.directory "$GITHUB_WORKSPACE"

      - name: Checkout code
        uses: actions/checkout@v5

      - name: Run formatter (clang-format)
        run: |
          clang-format \
            --style=file \
            $(git ls-files '*.cpp' '*.hpp' '*.tpp') \
            --dry-run \
            --Werror \
            2>&1

  build-test-project:
    needs: format
    name: ${{ matrix.arch }} / ${{ matrix.preset }}
    runs-on: ${{ matrix.runner }}
    container:
      image: ${{ matrix.container_image }}
    strategy:
      matrix:
        arch:
          - x86_64
          - aarch64
          - riscv64
        preset:
          - linux-native-gnu-debug
          - linux-native-gnu-release
          - linux-native-llvm-debug
          - linux-native-llvm-release
        include:
          - arch: x86_64
            runner: ubuntu-26.04
            container_image: ghcr.io/cfbaptista/bolt-dev:0.4.0-amd64
          - arch: aarch64
            runner: ubuntu-26.04-arm
            container_image: ghcr.io/cfbaptista/bolt-dev:0.4.0-arm64
          - arch: riscv64
            runner: ubuntu-26.04-riscv
            container_image: ghcr.io/cfbaptista/bolt-dev:0.4.0-riscv64
      fail-fast: false

    steps:
      - name: Fix dubious ownership warning
        run: git config --global --add safe.directory "$GITHUB_WORKSPACE"

      - name: Show architecture
        run: uname -m

      - name: Checkout code
        uses: actions/checkout@v5

      - name: Configure project
        run: cmake --preset ${{ matrix.preset }}

      - name: Build project
        run: cmake --build --preset ${{ matrix.preset }}

      - name: Test project
        run: ctest --preset ${{ matrix.preset }}

      - name: Run static analysis (clang-tidy)
        if: contains(matrix.preset, 'llvm')
        run: |
          clang-tidy \
            $(git ls-files '*.cpp') \
            -p build/${{ matrix.preset }} \
            2>&1

      - name: Run static analysis (cppcheck)
        run: |
          cppcheck \
            --project=build/${{ matrix.preset }}/compile_commands.json \
            --enable=all \
            --inconclusive \
            --force \
            --check-level=exhaustive \
            --suppress=missingIncludeSystem \
            --inline-suppr \
            --std=c++23 \
            --error-exitcode=1 \
            -i build/*/_deps \
            2>&1

  build-documentation:
    needs: build-test-project
    name: Build documentation
    runs-on: ubuntu-26.04
    container:
      image: ghcr.io/cfbaptista/bolt-dev:0.4.0-amd64

    steps:
      - name: Fix dubious ownership warning
        run: git config --global --add safe.directory "$GITHUB_WORKSPACE"

      - name: Checkout code
        uses: actions/checkout@v5

      - name: Configure project
        run: cmake --preset linux-native-llvm-debug

      - name: Run documentation generator (Doxygen)
        run: cmake --build --preset linux-native-llvm-debug --target documentation
